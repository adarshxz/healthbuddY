<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HealthBuddy — Admin Command Center</title>
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20 10V20H10V30H20V40H30V30H40V20H30V10H20Z' fill='%2300d4aa' /></svg>">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css">
  <style>
    .admin-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
    }

    .admin-tab {
      padding: 10px 20px;
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: var(--radius-md);
      font-weight: 600;
      transition: all 0.2s;
    }

    .admin-tab.active {
      background: rgba(0, 212, 170, 0.1);
      color: var(--accent-primary);
    }

    .admin-tab:hover:not(.active) {
      color: var(--text-primary);
      background: var(--bg-tertiary);
    }

    .content-panel {
      display: none;
    }

    .content-panel.active {
      display: block;
    }

    .delete-btn {
      padding: 6px 12px;
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.2);
      color: var(--accent-coral);
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s;
    }

    .delete-btn:hover {
      background: var(--accent-coral);
      color: #fff;
    }

    .role-select {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      color: var(--text-primary);
      padding: 4px 8px;
      font-size: 0.8rem;
      outline: none;
    }

    .role-select:focus {
      border-color: var(--accent-primary);
    }

    .data-table-header {
      display: grid;
      grid-template-columns: 2fr 2fr 1.5fr 1fr;
      padding: 12px 16px;
      color: var(--text-muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 600;
    }

    .user-row {
      grid-template-columns: 2fr 2fr 1.5fr 1fr;
    }

    .triage-row {
      grid-template-columns: 2fr 2fr 1fr 1fr;
    }

    .appointment-row {
      grid-template-columns: 2fr 1.5fr 1.5fr 1fr;
    }
  </style>
  <script src="theme.js"></script>
</head>

<body>
  <nav class="dash-nav">
    <div class="dash-nav-left">
      <div class="nav-logo"></div>
      <h1>HealthBuddy</h1><span style="color:var(--text-muted);margin-left:8px">| Admin</span>
    </div>
    <div class="dash-nav-right">
      <button class="nav-btn" onclick="toggleTheme()">Theme</button>
      <a href="/chat" class="nav-btn">Chat</a>
      <a href="/dashboard" class="nav-btn">Dashboard</a>
      <button class="nav-btn logout-nav-btn" id="logoutBtn">Logout</button>
    </div>
  </nav>

  <div class="dashboard-container">
    <div class="welcome-section">
      <div class="welcome-text">
        <h2>System Stats</h2>
        <p>Real-time health of the platform</p>
      </div>
      <div class="welcome-stats">
        <div class="stat-card"><span class="stat-icon"></span>
          <div class="stat-info"><span class="stat-number" id="totalUsers">0</span><span class="stat-label">Total
              Users</span></div>
        </div>
        <div class="stat-card"><span class="stat-icon"></span>
          <div class="stat-info"><span class="stat-number" id="totalTriages">0</span><span class="stat-label">AI
              Triages</span></div>
        </div>
        <div class="stat-card emergency-stat"><span class="stat-icon"></span>
          <div class="stat-info"><span class="stat-number" id="emergencies">0</span><span
              class="stat-label">Emergencies</span></div>
        </div>
        <div class="stat-card"><span class="stat-icon"></span>
          <div class="stat-info"><span class="stat-number" id="totalApts">0</span><span
              class="stat-label">Appointments</span></div>
        </div>
      </div>
    </div>

    <div class="dash-section">
      <div class="admin-tabs">
        <button class="admin-tab active" onclick="showPanel(event, 'users')">User Management</button>
        <button class="admin-tab" onclick="showPanel(event, 'triages')">Triage Monitoring</button>
        <button class="admin-tab" onclick="showPanel(event, 'appointments')">All Appointments</button>
      </div>

      <!-- Users Panel -->
      <div id="usersPanel" class="content-panel active">
        <div id="usersGrid" class="data-grid">
          <div class="loading-state">Loading users...</div>
        </div>
      </div>

      <!-- Triages Panel -->
      <div id="triagesPanel" class="content-panel">
        <div id="triagesGrid" class="data-grid">
          <div class="loading-state">Loading logs...</div>
        </div>
      </div>

      <!-- Appointments Panel -->
      <div id="appointmentsPanel" class="content-panel">
        <div id="appointmentsGrid" class="data-grid">
          <div class="loading-state">Loading records...</div>
        </div>
      </div>
    </div>
  </div>

  <script src="api.js"></script>
  <script>
    (() => {
      if (!API.requireAdmin()) return;
      document.getElementById('logoutBtn')?.addEventListener('click', () => API.logout());

      init();

      async function init() {
        loadStats();
        loadUsers();
        loadTriages();
        loadAppointments();
      }

      async function loadStats() {
        try {
          const stats = await API.get('/admin/stats');
          document.getElementById('totalUsers').textContent = stats.totalUsers || 0;
          document.getElementById('totalTriages').textContent = stats.totalTriages || 0;
          document.getElementById('emergencies').textContent = stats.emergencies || 0;
          document.getElementById('totalApts').textContent = stats.totalAppointments || 0;
        } catch { }
      }

      async function loadUsers() {
        const grid = document.getElementById('usersGrid');
        try {
          const data = await API.get('/admin/users');
          if (!data?.users?.length) { grid.innerHTML = '<div class="loading-state">No users found</div>'; return; }
          grid.innerHTML = data.users.map(u => `
            <div class="data-card">
              <span class="data-card-icon"></span>
              <div class="data-card-info">
                <div class="data-card-title">${u.name} <span style="color:var(--text-muted);font-weight:400;font-size:0.8rem">(${u.email})</span></div>
                <div class="data-card-meta">
                  <span>Joined: ${new Date(u.createdAt).toLocaleDateString()}</span>
                  <span>Age: ${u.age || '—'}</span>
                </div>
              </div>
              <div style="display:flex; gap:12px; align-items:center">
                <select class="role-select" onchange="changeRole('${u._id}', this.value)">
                  <option value="patient" ${u.role === 'patient' ? 'selected' : ''}>Patient</option>
                  <option value="doctor" ${u.role === 'doctor' ? 'selected' : ''}>Doctor</option>
                  <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>Admin</option>
                </select>
                <button class="delete-btn" onclick="deleteUser('${u._id}')">Delete</button>
              </div>
            </div>
          `).join('');
        } catch { grid.innerHTML = '<div class="loading-state">Access denied</div>'; }
      }

      async function loadTriages() {
        const grid = document.getElementById('triagesGrid');
        try {
          const data = await API.get('/admin/triages');
          if (!data?.triages?.length) { grid.innerHTML = '<div class="loading-state">No triage records found</div>'; return; }
          grid.innerHTML = data.triages.map(t => {
            const cls = t.isEmergency ? 'emergency' : (t.severityScore >= 5 ? 'moderate' : 'mild');
            const user = t.userId || { name: 'Guest' };
            return `
              <div class="data-card">
                <span class="data-card-icon"></span>
                <div class="data-card-info">
                  <div class="data-card-title">${user.name} — ${(t.symptoms || []).join(', ')}</div>
                  <div class="data-card-meta">
                    <span>${new Date(t.createdAt).toLocaleString()}</span>
                    <span>Score: ${t.severityScore}/10</span>
                    <span>AI: ${t.aiConfidence || 85}%</span>
                  </div>
                </div>
                <div style="display:flex; gap:12px; align-items:center">
                  <span class="data-card-badge badge-${cls}">${cls}</span>
                  <button class="delete-btn" onclick="deleteTriage('${t._id}')">Delete</button>
                </div>
              </div>
            `;
          }).join('');
        } catch { grid.innerHTML = '<div class="loading-state">Error loading logs</div>'; }
      }

      async function loadAppointments() {
        const grid = document.getElementById('appointmentsGrid');
        try {
          const data = await API.get('/admin/appointments');
          if (!data?.appointments?.length) { grid.innerHTML = '<div class="loading-state">No appointments found</div>'; return; }
          grid.innerHTML = data.appointments.map(a => `
            <div class="data-card">
              <span class="data-card-icon"></span>
              <div class="data-card-info">
                <div class="data-card-title">${a.specialization} for ${a.patientName}</div>
                <div class="data-card-meta">
                  <span>${a.date} at ${a.time}</span>
                  <span>Booked by: ${a.userId?.name || 'User'}</span>
                </div>
              </div>
              <div style="display:flex; gap:12px; align-items:center">
                <span class="data-card-badge badge-mild">${a.status}</span>
                <button class="delete-btn" onclick="deleteAppointment('${a._id}')">Delete</button>
              </div>
            </div>
          `).join('');
        } catch { grid.innerHTML = '<div class="loading-state">Error loading appointments</div>'; }
      }

      window.showPanel = (e, panelId) => {
        document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(panelId + 'Panel').classList.add('active');
        e.currentTarget.classList.add('active');
      };

      window.changeRole = async (id, role) => {
        try { await API.put(`/admin/users/${id}/role`, { role }); }
        catch (e) { alert('Failed to update role: ' + e.message); }
      };

      window.deleteUser = async (id) => {
        if (!confirm('Are you sure you want to delete this user? This action cannot be undone.')) return;
        try {
          await API.delete(`/admin/users/${id}`);
          loadUsers();
          loadStats();
        } catch (e) { alert('Failed to delete user: ' + e.message); }
      };

      window.deleteAppointment = async (id) => {
        if (!confirm('Are you sure you want to delete this appointment?')) return;
        try {
          await API.delete(`/admin/appointments/${id}`);
          loadAppointments();
          loadStats();
        } catch (e) { alert('Failed to delete appointment: ' + e.message); }
      };

      window.deleteTriage = async (id) => {
        if (!confirm('Are you sure you want to delete this triage record?')) return;
        try {
          await API.delete(`/admin/triages/${id}`);
          loadTriages();
          loadStats();
        } catch (e) { alert('Failed to delete triage: ' + e.message); }
      };
    })();
  </script>
</body>

</html>
